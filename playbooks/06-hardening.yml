---
# ============================================================
# Playbook 06 — Hardening de base — VMs Linux Groupe 3
# Usage : ansible-playbook -i inventory.ini playbooks/06-hardening.yml
# ============================================================
- name: Hardening de base — VMs Linux Groupe 3
  hosts: linux
  become: yes
  tasks:
    # === SSH Hardening ===
    - name: Désactiver l'authentification root par SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: restart sshd

    - name: Limiter les tentatives de connexion SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: 'MaxAuthTries 3'
      notify: restart sshd

    - name: Désactiver l'authentification par mot de passe vide
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
      notify: restart sshd

    - name: Timeout SSH inactivité (5 min)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: 'ClientAliveInterval 300'
      notify: restart sshd

    # === Fail2ban ===
    - name: Installer fail2ban
      apt:
        name: fail2ban
        state: present
        update_cache: yes

    - name: Configurer fail2ban pour SSH
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 600
          findtime = 600
          maxretry = 3

          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          bantime = 600
          findtime = 600
        owner: root
        group: root
        mode: '0644'
      notify: restart fail2ban

    - name: Activer et démarrer fail2ban
      systemd:
        name: fail2ban
        enabled: yes
        state: started

    # === Outils de sécurité ===
    - name: Installer les outils de sécurité de base
      apt:
        name:
          - ufw
          - unattended-upgrades
          - apt-listchanges
          - rkhunter
          - lynis
        state: present

    # === Mises à jour automatiques de sécurité ===
    - name: Activer les mises à jour automatiques de sécurité
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        owner: root
        group: root
        mode: '0644'

    # === Sysctl Hardening ===
    - name: Hardening noyau (sysctl)
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: yes
        state: present
        reload: yes
      loop:
        - { key: 'net.ipv4.conf.all.rp_filter', value: '1' }
        - { key: 'net.ipv4.conf.default.rp_filter', value: '1' }
        - { key: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
        - { key: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.send_redirects', value: '0' }
        - { key: 'net.ipv4.conf.all.accept_source_route', value: '0' }
        - { key: 'net.ipv4.tcp_syncookies', value: '1' }

    - name: Résumé du hardening
      debug:
        msg: "Hardening terminé sur {{ inventory_hostname }} — SSH durci, fail2ban actif, mises à jour auto activées, sysctl sécurisé"

  handlers:
    - name: restart sshd
      systemd:
        name: sshd
        state: restarted

    - name: restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
